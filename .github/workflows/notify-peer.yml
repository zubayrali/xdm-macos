name: Notify peer agent

on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: msg
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              EVENT="✅ PR merged"
            else
              EVENT="🔴 PR closed (unmerged)"
            fi
            BODY="${EVENT}
📦 ${{ github.repository }}
🌿 ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}
📝 ${{ github.event.pull_request.title }}
👤 ${{ github.event.pull_request.user.login }}"
            TRIGGER="${{ secrets.PEER_TRIGGER }} gEN!u\$ $EVENT on ${{ github.repository }}: \"${{ github.event.pull_request.title }}\". Pull and sync if this affects you."
          else
            BODY="🔒 Issue closed
📦 ${{ github.repository }}
📝 ${{ github.event.issue.title }}
👤 ${{ github.event.issue.user.login }}"
            TRIGGER="${{ secrets.PEER_TRIGGER }} gEN!u\$ closed issue on ${{ github.repository }}: \"${{ github.event.issue.title }}\". Review if this affects your work."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "trigger<<EOF" >> $GITHUB_OUTPUT
          echo "$TRIGGER" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send via bridge
        run: |
          ssh -i <(echo "${{ secrets.SERVER_SSH_KEY }}") \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            root@${{ secrets.SERVER_IP }} \
            python3 -c "
          import requests, sys
          jid, note, trigger = sys.argv[1], sys.argv[2], sys.argv[3]
          b = 'http://127.0.0.1:8080/send'
          requests.post(b, json={'jid':jid,'text':note},    timeout=10)
          requests.post(b, json={'jid':jid,'text':trigger}, timeout=10)
          " "${{ secrets.PEER_JID }}" "${{ steps.msg.outputs.body }}" "${{ steps.msg.outputs.trigger }}"
